<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Steam Game Analytics - 游戏评分预测平台</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
/* ============================================================
   CSS Variables & Reset
   ============================================================ */
:root {
  --bg: #0f1117;
  --surface: #1a1d27;
  --surface2: #21252f;
  --border: #2a2e3a;
  --text: #e1e4eb;
  --text2: #8b8fa3;
  --green: #26a641;
  --red: #e5534b;
  --yellow: #d29922;
  --blue: #58a6ff;
  --accent: #7c5cfc;
  --radius: 10px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg); color: var(--text); min-height: 100vh;
}

/* ============================================================
   Layout
   ============================================================ */
header {
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 14px 28px; display:flex; align-items:center; gap:16px;
  position: sticky; top:0; z-index:100;
}
header h1 { font-size: 1.3rem; font-weight: 700; }
header h1 span { color: var(--accent); }
header nav { display:flex; gap:8px; margin-left:auto; }
header nav button {
  background: var(--surface2); color: var(--text); border: 1px solid var(--border);
  padding: 8px 18px; border-radius: 8px; cursor:pointer; font-size: 0.9rem;
  transition: all 0.2s;
}
header nav button:hover, header nav button.active {
  background: var(--accent); border-color: var(--accent);
}

main { max-width: 1400px; margin:0 auto; padding: 24px; }

/* ============================================================
   Stats Cards
   ============================================================ */
.stats-grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 14px; margin-bottom: 24px;
}
.stat-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 16px 20px;
}
.stat-card .label { font-size:0.8rem; color:var(--text2); margin-bottom:6px; }
.stat-card .value { font-size:1.6rem; font-weight:700; }
.stat-card .sub { font-size:0.75rem; color:var(--text2); margin-top:4px; }

/* ============================================================
   Search & Filters
   ============================================================ */
.toolbar {
  display:flex; gap:12px; flex-wrap:wrap; align-items:center;
  margin-bottom: 16px; padding:16px; background:var(--surface);
  border-radius: var(--radius); border:1px solid var(--border);
}
.toolbar input[type="text"] {
  flex:1; min-width:200px; padding:10px 14px; border-radius:8px;
  border:1px solid var(--border); background:var(--bg); color:var(--text);
  font-size:0.9rem;
}
.toolbar select {
  padding:10px 14px; border-radius:8px;
  border:1px solid var(--border); background:var(--bg); color:var(--text);
  font-size:0.9rem; cursor:pointer;
}
.toolbar .btn {
  padding:10px 18px; border-radius:8px; border:1px solid var(--border);
  background:var(--accent); color:#fff; cursor:pointer; font-size:0.9rem;
  transition: opacity 0.2s;
}
.toolbar .btn:hover { opacity:0.85; }

/* ============================================================
   Game Table
   ============================================================ */
.table-wrap { overflow-x:auto; margin-bottom: 20px; }
table { width:100%; border-collapse:collapse; font-size:0.9rem; }
th {
  background: var(--surface2); padding:12px 14px; text-align:left;
  font-weight:600; cursor:pointer; user-select:none; white-space:nowrap;
  border-bottom: 2px solid var(--border);
}
th:hover { color: var(--accent); }
td { padding:10px 14px; border-bottom:1px solid var(--border); white-space:nowrap; }
tr { cursor:pointer; transition: background 0.15s; }
tr:hover { background: var(--surface2); }
td.title { max-width:300px; overflow:hidden; text-overflow:ellipsis; }
td a { color: var(--blue); text-decoration:none; }

.score-badge {
  display:inline-block; padding:3px 10px; border-radius:12px;
  font-size:0.8rem; font-weight:600;
}
.score-badge.positive { background: rgba(38,166,65,0.2); color: var(--green); }
.score-badge.mixed    { background: rgba(210,153,34,0.2); color: var(--yellow); }
.score-badge.negative { background: rgba(229,83,75,0.2); color: var(--red); }

.pagination {
  display:flex; gap:8px; justify-content:center; align-items:center;
  margin: 20px 0;
}
.pagination button {
  padding:8px 16px; border:1px solid var(--border); border-radius:8px;
  background:var(--surface); color:var(--text); cursor:pointer;
}
.pagination button:hover { background:var(--accent); border-color:var(--accent); }
.pagination button:disabled { opacity:0.4; cursor:not-allowed; }
.pagination span { color:var(--text2); }

/* ============================================================
   Detail Page
   ============================================================ */
.detail-header {
  display:flex; align-items:center; gap:16px; margin-bottom:24px;
}
.detail-header .back-btn {
  padding:8px 18px; border:1px solid var(--border); border-radius:8px;
  background:var(--surface); color:var(--text); cursor:pointer; font-size:0.9rem;
}
.detail-header .back-btn:hover { background:var(--accent); border-color:var(--accent); }

.detail-grid {
  display:grid; grid-template-columns: 1fr 1fr;
  gap:20px; margin-bottom:20px;
}
@media (max-width: 900px) { .detail-grid { grid-template-columns: 1fr; } }

.card {
  background: var(--surface); border:1px solid var(--border);
  border-radius: var(--radius); padding:20px;
}
.card h3 { font-size:1rem; margin-bottom:14px; color: var(--blue); }

.feature-chips { display:flex; flex-wrap:wrap; gap:8px; }
.chip {
  padding:4px 12px; border-radius:14px; font-size:0.8rem;
  background: var(--surface2); border:1px solid var(--border);
}
.chip.on { background: rgba(124,92,252,0.25); border-color: var(--accent); color: var(--accent); }

.score-meter {
  text-align:center; padding:20px;
}
.score-meter .big-score {
  font-size:4rem; font-weight:800; line-height:1;
}
.score-meter .label { color:var(--text2); margin-top:8px; }

.tag-cloud { display:flex; flex-wrap:wrap; gap:6px; }
.tag-cloud .tag {
  padding:3px 10px; border-radius:12px; font-size:0.78rem;
  background: var(--surface2); color: var(--text2);
}

.prediction-box {
  background: linear-gradient(135deg, rgba(124,92,252,0.15), rgba(88,166,255,0.1));
  border: 1px solid var(--accent); border-radius: var(--radius);
  padding: 20px; text-align:center;
}
.prediction-box h3 { color: var(--accent); }
.prediction-box .pred-score { font-size:2.5rem; font-weight:800; }

/* ============================================================
   Predict Form
   ============================================================ */
.predict-form {
  display:grid; grid-template-columns: 1fr 1fr;
  gap:12px;
}
@media (max-width: 600px) { .predict-form { grid-template-columns: 1fr; } }
.form-group { display:flex; flex-direction:column; gap:4px; }
.form-group label { font-size:0.8rem; color:var(--text2); }
.form-group input, .form-group select {
  padding:8px 12px; border-radius:6px; border:1px solid var(--border);
  background:var(--bg); color:var(--text); font-size:0.85rem;
}
.form-group input[type="range"] { padding:0; }

.toggle-row { display:flex; gap:12px; flex-wrap:wrap; align-items:center; }
.toggle {
  display:inline-flex; align-items:center; gap:6px; padding:6px 14px;
  border-radius:18px; border:1px solid var(--border); cursor:pointer;
  font-size:0.82rem; user-select:none; transition:all 0.2s;
  background: var(--surface2);
}
.toggle.active { background: var(--accent); border-color: var(--accent); }

/* ============================================================
   Charts
   ============================================================ */
.charts-grid {
  display:grid; grid-template-columns: 1fr 1fr;
  gap:20px; margin-bottom:20px;
}
@media (max-width: 900px) { .charts-grid { grid-template-columns: 1fr; } }
.chart-box {
  background: var(--surface); border:1px solid var(--border);
  border-radius: var(--radius); padding:16px;
}
.chart-box canvas { max-height:320px; }

.loading {
  text-align:center; padding:40px; color:var(--text2);
}
.error { color:var(--red); text-align:center; padding:20px; }

::-webkit-scrollbar { width:6px; height:6px; }
::-webkit-scrollbar-track { background:var(--bg); }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
</style>
</head>
<body>

<!-- ============================================================
     Header
     ============================================================ -->
<header>
  <h1>🎮 Steam <span>Game Analytics</span></h1>
  <nav>
    <button id="nav-overview" class="active" onclick="showOverview()">📊 游戏总览</button>
    <button id="nav-analyze" onclick="showAnalyze()">🔬 自由预测</button>
    <button id="nav-charts" onclick="showCharts()">📈 数据分析</button>
  </nav>
</header>

<main id="app">
  <!-- content injected by JS -->
  <div class="loading">加载中...</div>
</main>

<!-- ============================================================
     Scripts
     ============================================================ -->
<script>
// ================================================================
//  State
// ================================================================
const API = '';
let currentView = 'overview';
let currentPage = 1;
let gameListParams = { page:1, per_page:20, sort:'score', order:'desc', search:'' };
let statsData = null;
let allCharts = {};

// ================================================================
//  Utils
// ================================================================
async function fetchAPI(url, opts) {
  try {
    const resp = await fetch(url, opts);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    return await resp.json();
  } catch(e) {
    console.error('API error:', e);
    return null;
  }
}

function scoreClass(pct) {
  if (pct == null) return '';
  if (pct >= 80) return 'positive';
  if (pct >= 50) return 'mixed';
  return 'negative';
}
function scoreLabel(pct) {
  if (pct == null) return '-';
  if (pct >= 80) return '好评';
  if (pct >= 50) return '中评';
  return '差评';
}
function fmtNum(n) {
  if (n == null) return '-';
  if (n >= 1e6) return (n/1e6).toFixed(1)+'M';
  if (n >= 1e3) return (n/1e3).toFixed(1)+'K';
  return ''+n;
}
function fmtPrice(p) {
  if (p == null || p == 0) return 'Free';
  return '$'+Number(p).toFixed(2);
}
function escapeHTML(s) {
  const d = document.createElement('div');
  d.textContent = s || '';
  return d.innerHTML;
}

// ================================================================
//  View: Overview (Game List)
// ================================================================
async function showOverview() {
  currentView = 'overview';
  setNav('nav-overview');
  const app = document.getElementById('app');

  if (!statsData) statsData = await fetchAPI(API+'/api/stats');

  let html = renderStatsCards(statsData);
  html += renderToolbar();
  html += '<div id="game-table-wrap"></div>';
  html += '<div id="pagination-wrap" class="pagination"></div>';
  app.innerHTML = html;

  loadGameList();
  document.getElementById('search-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') { gameListParams.search = e.target.value; gameListParams.page = 1; loadGameList(); }
  });
}

function renderStatsCards(s) {
  if (!s) return '';
  return `
  <div class="stats-grid">
    <div class="stat-card">
      <div class="label">游戏总数</div>
      <div class="value">${fmtNum(s.total_games)}</div>
      <div class="sub">含 ${s.free_games} 款免费游戏</div>
    </div>
    <div class="stat-card">
      <div class="label">平均评分</div>
      <div class="value">${s.avg_score}%</div>
      <div class="sub">好评${s.sentiment?.positive||0} / 中评${s.sentiment?.mixed||0} / 差评${s.sentiment?.negative||0}</div>
    </div>
    <div class="stat-card">
      <div class="label">平均价格</div>
      <div class="value">$${s.avg_price}</div>
      <div class="sub">付费游戏 ${s.paid_games||0} 款</div>
    </div>
    <div class="stat-card">
      <div class="label">支持中文</div>
      <div class="value">${s.cn_support_pct}%</div>
      <div class="sub">${s.cn_support||0} 款游戏</div>
    </div>
    <div class="stat-card">
      <div class="label">含内购</div>
      <div class="value">${s.iap_count||0}</div>
      <div class="sub">${((s.iap_count||0)/s.total_games*100).toFixed(1)}% 的游戏有内购</div>
    </div>
  </div>`;
}

function renderToolbar() {
  return `
  <div class="toolbar">
    <input type="text" id="search-input" placeholder="🔍 搜索游戏名称 / 开发商 / 发行商..." value="${escapeHTML(gameListParams.search)}">
    <select id="sort-select" onchange="gameListParams.sort=this.value;gameListParams.page=1;loadGameList()">
      <option value="score" ${gameListParams.sort=='score'?'selected':''}>按评分排序</option>
      <option value="price" ${gameListParams.sort=='price'?'selected':''}>按价格排序</option>
      <option value="year" ${gameListParams.sort=='year'?'selected':''}>按发行年份</option>
      <option value="title" ${gameListParams.sort=='title'?'selected':''}>按名称排序</option>
    </select>
    <select id="order-select" onchange="gameListParams.order=this.value;gameListParams.page=1;loadGameList()">
      <option value="desc" ${gameListParams.order=='desc'?'selected':''}>降序</option>
      <option value="asc" ${gameListParams.order=='asc'?'selected':''}>升序</option>
    </select>
    <select id="feature-filter" onchange="gameListParams.feature=this.value;gameListParams.page=1;loadGameList()">
      <option value="">全部特征</option>
      <option value="singleplayer">单人游戏</option>
      <option value="multiplayer">多人游戏</option>
      <option value="achievements">Steam成就</option>
      <option value="controller">手柄支持</option>
      <option value="chinese">支持中文</option>
    </select>
    <button class="btn" onclick="gameListParams.page=1;loadGameList()">搜索</button>
  </div>`;
}

async function loadGameList() {
  const wrap = document.getElementById('game-table-wrap');
  const pag = document.getElementById('pagination-wrap');
  if (!wrap) return;

  // Ensure params are synced from UI
  const si = document.getElementById('search-input');
  if (si) gameListParams.search = si.value;
  const sf = document.getElementById('feature-filter');
  if (sf) gameListParams.feature = sf.value;

  const qs = new URLSearchParams(gameListParams);
  const data = await fetchAPI(API+'/api/games?'+qs.toString());
  if (!data) { wrap.innerHTML = '<div class="error">加载失败</div>'; return; }

  let html = '<div class="table-wrap"><table>';
  html += '<thead><tr>';
  const headers = [
    ['Title','标题'], ['RecentReviewPct','评分'], ['OriginalPrice','价格'],
    ['Developer','开发商'], ['ReleaseYear','发行年份'],
    ['NumTags','标签数'], ['NumLanguages','语言数'], ['SupportsChinese','中文'],
  ];
  for (const [key, label] of headers) {
    html += `<th onclick="gameListParams.sort='${key}';gameListParams.order=gameListParams.sort==='${key}'&&gameListParams.order==='asc'?'desc':'asc';gameListParams.page=1;loadGameList()">${label} ${gameListParams.sort==='${key}'?(gameListParams.order==='asc'?'▲':'▼'):''}</th>`;
  }
  html += '</tr></thead><tbody>';

  for (const g of data.games) {
    const sc = scoreClass(g.RecentReviewPct);
    html += `<tr onclick="showGameDetail(${g.id})">
      <td class="title" title="${escapeHTML(g.Title)}">${escapeHTML(g.Title)}</td>
      <td><span class="score-badge ${sc}">${g.RecentReviewPct != null ? g.RecentReviewPct+'%' : '-'} ${scoreLabel(g.RecentReviewPct)}</span></td>
      <td>${fmtPrice(g.OriginalPrice)} ${g.IsOnSale ? '<span style="color:var(--green);font-size:0.8rem">-'+Math.round(g.DiscountRate)+'%</span>' : ''}</td>
      <td>${escapeHTML(g.Developer||'-')}</td>
      <td>${g.ReleaseYear||'-'}</td>
      <td>${g.NumTags||0}</td>
      <td>${g.NumLanguages||0}</td>
      <td>${g.SupportsChinese ? '✅' : '❌'}</td>
    </tr>`;
  }
  html += '</tbody></table></div>';
  wrap.innerHTML = html;

  // Pagination
  let pagHtml = '';
  pagHtml += `<button ${data.page<=1?'disabled':''} onclick="gameListParams.page=${data.page-1};loadGameList()">← 上一页</button>`;
  pagHtml += `<span>第 ${data.page} / ${data.total_pages} 页 (共 ${data.total} 条)</span>`;
  pagHtml += `<button ${data.page>=data.total_pages?'disabled':''} onclick="gameListParams.page=${data.page+1};loadGameList()">下一页 →</button>`;
  pag.innerHTML = pagHtml;
}

// ================================================================
//  View: Game Detail
// ================================================================
async function showGameDetail(id) {
  currentView = 'detail';
  const app = document.getElementById('app');
  app.innerHTML = '<div class="loading">加载游戏详情...</div>';

  const data = await fetchAPI(API+'/api/games/'+id);
  if (!data) { app.innerHTML = '<div class="error">加载失败</div>'; return; }

  const g = data.game;
  const sc = scoreClass(g.RecentReviewPct);

  let html = `
  <div class="detail-header">
    <button class="back-btn" onclick="showOverview()">← 返回列表</button>
    <h2 style="flex:1">${escapeHTML(g.Title)}</h2>
  </div>`;

  // Main info + score
  html += `<div class="detail-grid">`;
  html += `<div class="card">
    <h3>📋 基本信息</h3>
    <table style="border:none"><tbody>
      <tr><td style="color:var(--text2);border:none;padding:4px 8px">开发商</td><td style="border:none;padding:4px 8px">${escapeHTML(g.Developer||'Unknown')}</td></tr>
      <tr><td style="color:var(--text2);border:none;padding:4px 8px">发行商</td><td style="border:none;padding:4px 8px">${escapeHTML(g.Publisher||'Unknown')}</td></tr>
      <tr><td style="color:var(--text2);border:none;padding:4px 8px">发行日期</td><td style="border:none;padding:4px 8px">${g.ReleaseYear||'?'}-${String(g.ReleaseMonth||1).padStart(2,'0')}</td></tr>
      <tr><td style="color:var(--text2);border:none;padding:4px 8px">原价</td><td style="border:none;padding:4px 8px">${fmtPrice(g.OriginalPrice)} ${g.IsOnSale?`<span style="color:var(--green)">折后 ${fmtPrice(g.DiscountedPrice)} (-${Math.round(g.DiscountRate)}%)</span>`:''}</td></tr>
      <tr><td style="color:var(--text2);border:none;padding:4px 8px">语言数</td><td style="border:none;padding:4px 8px">${g.NumLanguages||0} ${g.SupportsChinese?'(含中文)':'(无中文)'}</td></tr>
    </tbody></table>
  </div>`;

  // Score card
  html += `<div class="card score-meter">
    <h3>${g.RecentReviewPct ? '近期评分' : '评分'}</h3>
    <div class="big-score" style="color:${sc==='positive'?'var(--green)':sc==='mixed'?'var(--yellow)':'var(--red)'}">${g.RecentReviewPct||g.AllReviewPct||'-'}%</div>
    <div class="label">${g.RecentReviewCount ? fmtNum(g.RecentReviewCount)+' 条评价' : ''}</div>
    <div class="label">${g.RecentSentiment||g.AllSentiment||''}</div>
  </div>`;

  // Features
  html += `<div class="card">
    <h3>⚙️ 游戏特征</h3>
    <div class="feature-chips">
      ${['HasSinglePlayer','HasMultiplayer','HasAchievements','HasControllerSupport','HasTradingCards','HasWorkshop','HasInAppPurchases'].map(k => {
        const label = k.replace('Has','').replace('Supports','');
        return `<span class="chip ${g[k]?'on':''}">${g[k]?'✓':'✗'} ${label}</span>`;
      }).join('')}
      <span class="chip ${g.SupportsChinese?'on':''}">${g.SupportsChinese?'✓':'✗'} 中文</span>
    </div>
  </div>`;

  // Prediction
  html += `<div class="card prediction-box">
    <h3>🤖 AI 预测评分</h3>
    <div class="pred-score">${data.prediction != null ? data.prediction+'%' : '--'}</div>
    <div style="color:var(--text2);margin-top:4px;">基于 ${g.NumFeatures||0} 个特征 + ${g.NumTags||0} 个标签的模型预测</div>
    ${data.prediction != null && g.RecentReviewPct != null ? `
      <div style="margin-top:8px;font-size:0.85rem;">真实评分 ${g.RecentReviewPct}% → 误差 ${Math.abs(data.prediction-g.RecentReviewPct).toFixed(1)} 个百分点</div>
    ` : ''}
  </div>`;

  html += `</div>`; // end detail-grid

  // Tags
  html += `<div class="card" style="margin-bottom:20px;">
    <h3>🏷️ 标签</h3>
    <div class="tag-cloud">${(Array.isArray(g.PopularTags)?g.PopularTags:[]).map(t=>`<span class="tag">${t}</span>`).join('')}</div>
  </div>`;

  // Similar games
  if (data.similar && data.similar.length) {
    html += `<div class="card" style="margin-bottom:20px;">
      <h3>🔗 同类游戏推荐</h3>
      <div class="table-wrap"><table><thead><tr><th>游戏</th><th>评分</th><th>价格</th><th>开发商</th></tr></thead><tbody>`;
    for (const s of data.similar) {
      html += `<tr onclick="showGameDetail(${s.id})">
        <td class="title">${escapeHTML(s.Title)}</td>
        <td><span class="score-badge ${scoreClass(s.RecentReviewPct)}">${s.RecentReviewPct||'-'}%</span></td>
        <td>${fmtPrice(s.OriginalPrice)}</td>
        <td>${escapeHTML(s.Developer||'')}</td>
      </tr>`;
    }
    html += '</tbody></table></div></div>';
  }

  app.innerHTML = html;
}

// ================================================================
//  View: Free Prediction Tool
// ================================================================
async function showAnalyze() {
  currentView = 'analyze';
  setNav('nav-analyze');
  const app = document.getElementById('app');

  const topTags = [
    'Indie','Action','Adventure','Casual','Singleplayer','Simulation','RPG','Strategy','2D','3D',
    'Multiplayer','Puzzle','Horror','FPS','Open World','Fantasy','Sci-fi','Survival','Shooter','Racing'
  ];

  let html = `<h2 style="margin-bottom:16px;">🔬 自由预测工具</h2>
  <p style="color:var(--text2);margin-bottom:20px;">调整以下参数，AI将实时预测该配置下游戏的预期好评率。</p>`;

  html += `<div class="detail-grid">
    <div class="card">
      <h3>游戏参数设定</h3>
      <div class="predict-form">
        <div class="form-group"><label>价格 (USD)</label><input type="number" id="p-price" value="9.99" step="1" min="0"></div>
        <div class="form-group"><label>支持语言数</label><input type="number" id="p-lang" value="5" step="1" min="1" max="30"></div>
        <div class="form-group"><label>发行年份</label><input type="number" id="p-year" value="2024" step="1" min="2000" max="2026"></div>
        <div class="form-group"><label>发行月份</label><select id="p-month">${Array.from({length:12},(_,i)=>`<option value="${i+1}" ${i==5?'selected':''}>${i+1}月</option>`).join('')}</select></div>
        <div class="form-group"><label>游戏特征数</label><input type="range" id="p-feats" min="0" max="10" value="3" oninput="document.getElementById('p-feats-v').textContent=this.value"><span id="p-feats-v" style="color:var(--text2)">3</span></div>
        <div class="form-group"><label>标签数</label><input type="range" id="p-tags-n" min="1" max="20" value="10" oninput="document.getElementById('p-tags-v').textContent=this.value"><span id="p-tags-v" style="color:var(--text2)">10</span></div>
      </div>

      <h4 style="margin:14px 0 8px;">游戏特征</h4>
      <div class="toggle-row" id="toggle-features">
        ${['单人游戏','多人游戏','手柄支持','Steam成就','Steam交易卡','内购','创意工坊','支持中文'].map((l,i) => {
          const keys = ['HasSinglePlayer','HasMultiplayer','HasControllerSupport','HasAchievements','HasTradingCards','HasInAppPurchases','HasWorkshop','SupportsChinese'];
          return `<span class="toggle ${(i===0||i===3)?'active':''}" data-key="${keys[i]}" onclick="this.classList.toggle('active')">${l}</span>`;
        }).join('')}
      </div>

      <h4 style="margin:14px 0 8px;">标签选择 <span style="font-size:0.8rem;color:var(--text2)">(点击选中，最多10个)</span></h4>
      <div class="tag-cloud" id="tag-selector">
        ${topTags.map(t=>`<span class="tag" style="cursor:pointer" onclick="this.classList.toggle('active');this.style.background=this.classList.contains('active')?'var(--accent)':''">${t}</span>`).join('')}
      </div>

      <button class="btn" style="margin-top:16px;width:100%;padding:14px;font-size:1rem;" onclick="runPrediction()">🤖 开始预测</button>
    </div>

    <div>
      <div class="card prediction-box" id="predict-result-box">
        <h3>预测结果</h3>
        <div style="font-size:3rem;font-weight:800;color:var(--accent);" id="predict-score">--%</div>
        <div id="predict-label" style="margin-top:6px;"></div>
        <div id="predict-factors" style="margin-top:12px;font-size:0.85rem;"></div>
      </div>
      <div class="card" style="margin-top:16px;">
        <h3>模型特征重要性</h3>
        <div id="feature-imp-list" style="font-size:0.85rem;">加载中...</div>
      </div>
    </div>
  </div>`;

  app.innerHTML = html;

  // Load feature importance
  const imp = await fetchAPI(API+'/api/feature-importance');
  if (imp) {
    document.getElementById('feature-imp-list').innerHTML = imp.slice(0,12).map((f,i)=>
      `<div style="display:flex;align-items:center;gap:8px;margin:6px 0;">
        <span style="min-width:180px;font-size:0.8rem;">${f.feature}</span>
        <div style="flex:1;height:6px;background:var(--surface2);border-radius:3px;">
          <div style="width:${Math.round(f.importance*1000)}%;height:100%;background:var(--accent);border-radius:3px;"></div>
        </div>
        <span style="font-size:0.75rem;color:var(--text2);min-width:50px;">${(f.importance*100).toFixed(1)}%</span>
      </div>`
    ).join('');
  }
}

async function runPrediction() {
  const box = document.getElementById('predict-score');
  const label = document.getElementById('predict-label');
  const factors = document.getElementById('predict-factors');

  box.textContent = '...';
  factors.innerHTML = '';

  // Collect params
  const features = {};
  document.querySelectorAll('#toggle-features .toggle').forEach(el => {
    const key = el.dataset.key;
    if (key) features[key] = el.classList.contains('active') ? 1 : 0;
  });

  const selectedTags = [];
  document.querySelectorAll('#tag-selector .tag.active').forEach(el => {
    selectedTags.push(el.textContent.trim());
  });

  const body = {
    OriginalPrice: parseFloat(document.getElementById('p-price').value) || 0,
    ReleaseYear: parseInt(document.getElementById('p-year').value) || 2024,
    ReleaseMonth: parseInt(document.getElementById('p-month').value) || 6,
    NumLanguages: parseInt(document.getElementById('p-lang').value) || 5,
    NumFeatures: parseInt(document.getElementById('p-feats').value) || 3,
    NumTags: parseInt(document.getElementById('p-tags-n').value) || 10,
    IsFree: (parseFloat(document.getElementById('p-price').value) || 0) === 0 ? 1 : 0,
    tags: selectedTags,
    ...features,
  };

  const result = await fetchAPI(API+'/api/predict', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(body),
  });

  if (result) {
    box.textContent = result.predicted_score + '%';
    const cls = result.interpretation;
    label.innerHTML = cls === 'Positive'
      ? '<span class="score-badge positive">预测为好評</span>'
      : cls === 'Mixed'
        ? '<span class="score-badge mixed">预测为中评</span>'
        : '<span class="score-badge negative">预测为差评</span>';
    if (result.top_factors) {
      factors.innerHTML = '<div style="text-align:left;margin-top:8px;"><b>关键影响因素:</b><br>'
        + result.top_factors.map(f =>
          `<span style="color:${f.impact>0?'var(--green)':'var(--red)'}">${f.impact>0?'↑':'↓'} ${f.feature}</span>`
        ).join(' &nbsp;|&nbsp; ')
        + '</div>';
    }
  } else {
    box.textContent = 'Error';
  }
}

// ================================================================
//  View: Data Charts
// ================================================================
async function showCharts() {
  currentView = 'charts';
  setNav('nav-charts');
  const app = document.getElementById('app');

  if (!statsData) statsData = await fetchAPI(API+'/api/stats');
  const s = statsData;

  let html = `<h2 style="margin-bottom:16px;">📈 数据分析看板</h2>`;
  html += renderStatsCards(s);

  html += `
  <div class="charts-grid">
    <div class="chart-box">
      <h3>评分分布</h3>
      <canvas id="chart-sentiment"></canvas>
    </div>
    <div class="chart-box">
      <h3>价格分布</h3>
      <canvas id="chart-price"></canvas>
    </div>
    <div class="chart-box">
      <h3>年度趋势</h3>
      <canvas id="chart-year"></canvas>
    </div>
    <div class="chart-box">
      <h3>热门标签 Top 15</h3>
      <canvas id="chart-tags"></canvas>
    </div>
  </div>`;

  app.innerHTML = html;

  // Destroy old charts
  Object.values(allCharts).forEach(c => c.destroy());
  allCharts = {};

  if (!s) { app.innerHTML += '<div class="error">数据加载失败</div>'; return; }

  // 1. Sentiment Pie
  const ctx1 = document.getElementById('chart-sentiment')?.getContext('2d');
  if (ctx1) {
    allCharts.sentiment = new Chart(ctx1, {
      type: 'doughnut',
      data: {
        labels: ['好评 (>=80%)','中评 (50-79%)','差评 (<50%)'],
        datasets: [{ data: [s.sentiment?.positive||0, s.sentiment?.mixed||0, s.sentiment?.negative||0], backgroundColor: ['#26a641','#d29922','#e5534b'], borderColor: '#1a1d27', borderWidth: 3 }]
      },
      options: { responsive: true, plugins: { legend: { labels: { color: '#e1e4eb' } } } }
    });
  }

  // 2. Price Distribution Bar
  const ctx2 = document.getElementById('chart-price')?.getContext('2d');
  if (ctx2 && s.price_distribution) {
    allCharts.price = new Chart(ctx2, {
      type: 'bar',
      data: {
        labels: s.price_distribution.map(d=>d.label),
        datasets: [{ label: '游戏数量', data: s.price_distribution.map(d=>d.count), backgroundColor: '#7c5cfc', borderRadius: 6 }]
      },
      options: {
        responsive: true,
        scales: { x: { ticks: { color: '#8b8fa3' } }, y: { ticks: { color: '#8b8fa3' }, grid: { color: '#2a2e3a' } } },
        plugins: { legend: { labels: { color: '#e1e4eb' } } }
      }
    });
  }

  // 3. Year Trend
  const ctx3 = document.getElementById('chart-year')?.getContext('2d');
  if (ctx3 && s.year_trend) {
    allCharts.year = new Chart(ctx3, {
      type: 'line',
      data: {
        labels: s.year_trend.map(d=>d.year),
        datasets: [
          { label: '游戏数量', data: s.year_trend.map(d=>d.count), borderColor: '#7c5cfc', backgroundColor: 'rgba(124,92,252,0.1)', yAxisID: 'y', fill: true, tension: 0.3 },
          { label: '平均评分(%)', data: s.year_trend.map(d=>d.avg_score), borderColor: '#26a641', yAxisID: 'y1', tension: 0.3, borderWidth: 2 },
        ]
      },
      options: {
        responsive: true,
        scales: {
          x: { ticks: { color: '#8b8fa3', maxTicksLimit: 10 } },
          y: { position: 'left', ticks: { color: '#8b8fa3' }, grid: { color: '#2a2e3a' }, title: { display: true, text: 'Game Count', color: '#8b8fa3' } },
          y1: { position: 'right', min: 60, max: 90, ticks: { color: '#26a641' }, grid: { display: false }, title: { display: true, text: 'Avg Score %', color: '#26a641' } },
        },
        plugins: { legend: { labels: { color: '#e1e4eb' } } }
      }
    });
  }

  // 4. Top Tags
  const ctx4 = document.getElementById('chart-tags')?.getContext('2d');
  if (ctx4 && s.top_tags) {
    const top15 = s.top_tags.slice(0,15);
    allCharts.tags = new Chart(ctx4, {
      type: 'bar',
      data: {
        labels: top15.map(t=>t.name),
        datasets: [{ label: '出现次数', data: top15.map(t=>t.count), backgroundColor: top15.map((_,i)=>`hsl(${260+i*10},60%,55%)`), borderRadius: 6 }]
      },
      options: {
        indexAxis: 'y',
        responsive: true,
        scales: { x: { ticks: { color: '#8b8fa3' }, grid: { color: '#2a2e3a' } }, y: { ticks: { color: '#8b8fa3', font:{size:11} } } },
        plugins: { legend: { labels: { color: '#e1e4eb' } } }
      }
    });
  }
}
