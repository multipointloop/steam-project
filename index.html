<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Steam Game Analytics - 游戏评分预测平台</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
/* ============================================================
   Premium Design System — Steam Game Analytics
   ============================================================ */
:root {
  --bg: #08090d;
  --surface: rgba(22, 24, 35, 0.75);
  --surface2: rgba(33, 37, 47, 0.85);
  --border: rgba(255, 255, 255, 0.06);
  --border-glow: rgba(124, 92, 252, 0.25);
  --text: #e8eaf0;
  --text2: #7c8099;

  --accent: #7c5cfc;
  --accent-glow: #9d8cff;
  --accent-gradient: linear-gradient(135deg, #7c5cfc 0%, #58a6ff 100%);
  --gold: #f0c060;
  --gold-gradient: linear-gradient(135deg, #f0c060 0%, #e89040 100%);

  --green: #26a641; --green-glow: #3dd68c;
  --red: #e5534b; --red-glow: #f87168;
  --yellow: #d29922;
  --blue: #58a6ff;

  --radius-sm: 8px; --radius: 12px; --radius-lg: 16px;
  --shadow-glow: 0 0 40px rgba(124, 92, 252, 0.12);
  --shadow-card: 0 4px 24px rgba(0, 0, 0, 0.3);
  --backdrop: blur(16px) saturate(180%);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background:
    radial-gradient(ellipse at 20% 50%, rgba(124, 92, 252, 0.06) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 20%, rgba(88, 166, 255, 0.04) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 80%, rgba(38, 166, 65, 0.03) 0%, transparent 50%),
    var(--bg);
  color: var(--text); min-height: 100vh; letter-spacing: 0.01em; line-height: 1.6;
  position: relative;
}

body::before {
  content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background-image:
    radial-gradient(1px 1px at 10% 20%, rgba(124,92,252,0.3), transparent),
    radial-gradient(1px 1px at 30% 60%, rgba(88,166,255,0.2), transparent),
    radial-gradient(1.5px 1.5px at 50% 10%, rgba(124,92,252,0.2), transparent),
    radial-gradient(1px 1px at 70% 80%, rgba(88,166,255,0.15), transparent),
    radial-gradient(1px 1px at 90% 30%, rgba(124,92,252,0.2), transparent);
  animation: particle-drift 20s ease-in-out infinite;
}

@keyframes particle-drift {
  0%, 100% { transform: translate(0, 0); opacity: 0.5; }
  50% { transform: translate(10px, -10px); opacity: 1; }
}

/* Layout */
header {
  background: rgba(14, 15, 20, 0.85); backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-bottom: 1px solid rgba(255, 255, 255, 0.05);
  padding: 14px 28px; display:flex; align-items:center; gap:16px;
  position: sticky; top:0; z-index:100;
}
header h1 { font-size: 1.3rem; font-weight: 800; letter-spacing: -0.02em; }
header h1 span { background: var(--accent-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
header nav { display:flex; gap:6px; margin-left:auto; flex-wrap:wrap; }
header nav button {
  background: rgba(255,255,255,0.04); color: var(--text2); border: 1px solid rgba(255,255,255,0.06);
  padding: 8px 16px; border-radius: 10px; cursor:pointer; font-size: 0.82rem; font-weight: 500;
  transition: all 0.25s ease;
}
header nav button:hover, header nav button.active {
  background: rgba(124,92,252,0.2); border-color: rgba(124,92,252,0.3); color: var(--text);
  box-shadow: 0 0 20px rgba(124,92,252,0.1);
}

main { max-width: 1400px; margin:0 auto; padding: 24px; position: relative; z-index: 1; animation: fadeIn 0.3s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

/* Glass Cards */
.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(190px, 1fr)); gap: 14px; margin-bottom: 24px; }
.stat-card {
  background: rgba(22,24,35,0.65); backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.06); border-radius: var(--radius-lg);
  padding: 18px 22px; transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
  position: relative; overflow: hidden;
}
.stat-card::before {
  content: ''; position: absolute; top:0; left:0; width:100%; height:3px;
  background: var(--accent-gradient); opacity:0; transition: opacity 0.3s;
}
.stat-card:hover { transform: translateY(-4px); border-color: var(--border-glow); box-shadow: var(--shadow-card); }
.stat-card:hover::before { opacity:1; }
.stat-card .label { font-size:0.78rem; color:var(--text2); margin-bottom:6px; font-weight:500; text-transform:uppercase; letter-spacing:0.05em; }
.stat-card .value { font-size:1.8rem; font-weight:800; letter-spacing:-0.02em; }
.stat-card .value.accent { background: var(--accent-gradient); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
.stat-card .sub { font-size:0.72rem; color:var(--text2); margin-top:4px; }

/* Toolbar */
.toolbar {
  display:flex; gap:10px; flex-wrap:wrap; align-items:center;
  margin-bottom:16px; padding:18px;
  background: rgba(22,24,35,0.5); backdrop-filter: blur(8px);
  border-radius: var(--radius-lg); border:1px solid rgba(255,255,255,0.06);
}
.toolbar input[type="text"] {
  flex:1; min-width:200px; padding:10px 14px; border-radius:10px;
  border:1px solid rgba(255,255,255,0.08); background:rgba(15,17,23,0.6); color:var(--text);
  font-size:0.88rem; transition: all 0.3s;
}
.toolbar input[type="text"]:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(124,92,252,0.12); outline:none; }
.toolbar select {
  padding:10px 14px; border-radius:10px; border:1px solid rgba(255,255,255,0.08);
  background:rgba(15,17,23,0.6); color:var(--text); font-size:0.88rem; cursor:pointer;
}
.toolbar .btn, .btn {
  padding:10px 20px; border-radius:10px; border:none; background:var(--accent-gradient);
  color:#fff; cursor:pointer; font-size:0.88rem; font-weight:600;
  transition: all 0.3s ease;
}
.toolbar .btn:hover, .btn:hover { transform:translateY(-2px); box-shadow:0 6px 20px rgba(124,92,252,0.4); }
.btn:active { transform:translateY(0); }

/* Table */
.table-wrap { overflow-x:auto; margin-bottom:20px; border-radius:var(--radius); border:1px solid rgba(255,255,255,0.06); background:rgba(22,24,35,0.3); }
table { width:100%; border-collapse:collapse; font-size:0.88rem; }
th { background:rgba(33,37,47,0.7); padding:13px 16px; text-align:left; font-weight:600; user-select:none; white-space:nowrap; border-bottom:2px solid rgba(255,255,255,0.06); font-size:0.75rem; text-transform:uppercase; letter-spacing:0.04em; cursor:pointer; }
th:hover { color: var(--accent); }
td { padding:11px 16px; border-bottom:1px solid rgba(255,255,255,0.04); white-space:nowrap; }
tr { cursor:pointer; transition: all 0.15s; }
tr:hover { background: rgba(124,92,252,0.06); }
td.title { max-width:300px; overflow:hidden; text-overflow:ellipsis; }
td a { color:var(--blue); text-decoration:none; }

.score-badge { display:inline-block; padding:4px 12px; border-radius:14px; font-size:0.78rem; font-weight:600; }
.score-badge.positive { background:rgba(38,166,65,0.18); color:var(--green); }
.score-badge.mixed { background:rgba(210,153,34,0.18); color:var(--yellow); }
.score-badge.negative { background:rgba(229,83,75,0.18); color:var(--red); }

.pagination { display:flex; gap:8px; justify-content:center; align-items:center; margin:20px 0; }
.pagination button { padding:8px 16px; border:1px solid rgba(255,255,255,0.08); border-radius:10px; background:rgba(22,24,35,0.5); color:var(--text); cursor:pointer; transition:all 0.2s; }
.pagination button:hover { background:var(--accent); border-color:var(--accent); color:#fff; }
.pagination button:disabled { opacity:0.35; cursor:not-allowed; }
.pagination span { color:var(--text2); font-size:0.85rem; }

/* Detail Page */
.detail-header { display:flex; align-items:center; gap:16px; margin-bottom:24px; }
.detail-header .back-btn { padding:8px 18px; border:1px solid rgba(255,255,255,0.08); border-radius:10px; background:rgba(22,24,35,0.5); color:var(--text); cursor:pointer; font-size:0.88rem; transition:all 0.2s; }
.detail-header .back-btn:hover { background:var(--accent); border-color:var(--accent); color:#fff; }

.detail-grid { display:grid; grid-template-columns:1fr 1fr; gap:18px; margin-bottom:18px; }
@media(max-width:900px){ .detail-grid{grid-template-columns:1fr;} }

.card { background:rgba(22,24,35,0.55); backdrop-filter:blur(8px); border:1px solid rgba(255,255,255,0.06); border-radius:var(--radius-lg); padding:22px; transition:all 0.3s ease; }
.card:hover { border-color:rgba(124,92,252,0.15); box-shadow:0 4px 20px rgba(0,0,0,0.2); }
.card h3 { font-size:1rem; font-weight:700; margin-bottom:14px; color:var(--text); }
.card h3.gradient { background:var(--accent-gradient); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }

.feature-chips { display:flex; flex-wrap:wrap; gap:8px; }
.chip { padding:5px 13px; border-radius:16px; font-size:0.78rem; background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.08); transition:all 0.2s; }
.chip.on { background:rgba(124,92,252,0.2); border-color:rgba(124,92,252,0.3); color:var(--accent-glow); }
.chip:hover { transform:scale(1.05); }

.score-meter { text-align:center; padding:24px; }
.score-meter .big-score { font-size:4.5rem; font-weight:800; line-height:1; letter-spacing:-0.04em; }
.score-meter .label { color:var(--text2); margin-top:8px; }

.tag-cloud { display:flex; flex-wrap:wrap; gap:6px; }
.tag-cloud .tag { padding:4px 11px; border-radius:14px; font-size:0.76rem; background:rgba(255,255,255,0.03); color:var(--text2); border:1px solid rgba(255,255,255,0.06); transition:all 0.2s; }
.tag-cloud .tag:hover { border-color:var(--accent); color:var(--text); }

.prediction-box {
  background: linear-gradient(135deg, rgba(124,92,252,0.12), rgba(88,166,255,0.06));
  border:1px solid rgba(124,92,252,0.2); border-radius:var(--radius-lg);
  padding:24px; text-align:center; animation:glow-pulse 4s ease-in-out infinite;
}
@keyframes glow-pulse {
  0%,100%{box-shadow:0 0 20px rgba(124,92,252,0.05);}
  50%{box-shadow:0 0 35px rgba(124,92,252,0.12);}
}
.prediction-box h3 { color:var(--accent-glow); }
.prediction-box .pred-score { font-size:3rem; font-weight:800; }

/* Predict Form */
.predict-form { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
@media(max-width:600px){ .predict-form{grid-template-columns:1fr;} }
.form-group { display:flex; flex-direction:column; gap:4px; }
.form-group label { font-size:0.78rem; color:var(--text2); font-weight:500; }
.form-group input, .form-group select { padding:9px 13px; border-radius:8px; border:1px solid rgba(255,255,255,0.08); background:rgba(15,17,23,0.6); color:var(--text); font-size:0.85rem; }
.form-group input[type="range"] { padding:0; accent-color:var(--accent); }

.toggle-row { display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
.toggle { display:inline-flex; align-items:center; gap:6px; padding:6px 14px; border-radius:20px; border:1px solid rgba(255,255,255,0.08); cursor:pointer; font-size:0.8rem; user-select:none; transition:all 0.25s; background:rgba(255,255,255,0.02); }
.toggle.active { background:var(--accent); border-color:var(--accent); color:#fff; }

/* Charts */
.charts-grid { display:grid; grid-template-columns:1fr 1fr; gap:18px; margin-bottom:18px; }
@media(max-width:900px){ .charts-grid{grid-template-columns:1fr;} }
.chart-box { background:rgba(22,24,35,0.45); border:1px solid rgba(255,255,255,0.06); border-radius:var(--radius-lg); padding:18px; }
.chart-box h3 { margin-bottom:12px; font-size:0.9rem; font-weight:600; }
.chart-box canvas { max-height:320px; }

/* Gap Analysis Cards */
.gap-alert { margin-top:16px; border-radius:var(--radius-lg); padding:20px; border:1px solid rgba(229,83,75,0.3); background:linear-gradient(135deg,rgba(229,83,75,0.08),transparent); }
.gap-alert.positive { border-color:rgba(38,166,65,0.3); background:linear-gradient(135deg,rgba(38,166,65,0.08),transparent); }
.gap-reason { background:rgba(22,24,35,0.6); border-radius:10px; padding:14px; margin:8px 0; border-left:3px solid var(--red); transition:all 0.2s; }
.gap-reason:hover { transform:translateX(4px); }
.gap-reason.positive { border-left-color:var(--green); }
.confidence-bar { height:4px; background:rgba(255,255,255,0.06); border-radius:2px; margin-top:8px; overflow:hidden; }
.confidence-fill { height:100%; border-radius:2px; transition:width 0.5s ease; }

/* Loading / Skeleton */
.loading { text-align:center; padding:40px; color:var(--text2); }
.skeleton { background:linear-gradient(90deg,rgba(255,255,255,0.03) 25%,rgba(255,255,255,0.06) 50%,rgba(255,255,255,0.03) 75%); background-size:200% 100%; animation:shimmer 1.5s infinite; border-radius:8px; }
@keyframes shimmer { 0%{background-position:200% 0;} 100%{background-position:-200% 0;} }
.error { color:var(--red); text-align:center; padding:20px; }

/* Scrollbar */
::-webkit-scrollbar { width:6px; height:6px; }
::-webkit-scrollbar-track { background:var(--bg); }
::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.1); border-radius:3px; }
::-webkit-scrollbar-thumb:hover { background:rgba(255,255,255,0.18); }

/* ============================================================
   DeepSeek Chat Widget
   ============================================================ */
.deepseek-widget { position:fixed; bottom:24px; right:24px; z-index:1000; font-family:'Inter',-apple-system,sans-serif; }
.ds-fab {
  width:56px; height:56px; border-radius:28px; background:linear-gradient(135deg,#4A6CF7,#6366F1);
  border:none; cursor:pointer; display:flex; align-items:center; justify-content:center;
  box-shadow:0 4px 24px rgba(74,108,247,0.4); transition:all 0.3s cubic-bezier(0.4,0,0.2,1);
  position:relative; font-size:1.3rem;
}
.ds-fab:hover { transform:scale(1.1); box-shadow:0 6px 32px rgba(74,108,247,0.6); }
.ds-fab::after {
  content:''; position:absolute; inset:-4px; border-radius:32px;
  background:linear-gradient(135deg,rgba(74,108,247,0.3),transparent);
  animation:ds-ring 2s ease-in-out infinite;
}
@keyframes ds-ring {
  0%,100%{transform:scale(1);opacity:0.5;} 50%{transform:scale(1.2);opacity:0;}
}
.ds-panel {
  position:absolute; bottom:72px; right:0; width:360px; max-height:520px;
  background:rgba(22,24,35,0.97); backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.08); border-radius:16px;
  box-shadow:0 20px 60px rgba(0,0,0,0.5); overflow:hidden;
  animation:ds-slideUp 0.3s ease;
}
@keyframes ds-slideUp { from{opacity:0;transform:translateY(16px);} to{opacity:1;transform:translateY(0);} }
.ds-header { display:flex; justify-content:space-between; align-items:center; padding:14px 18px; background:rgba(74,108,247,0.12); border-bottom:1px solid rgba(255,255,255,0.06); font-weight:600; font-size:0.9rem; }
.ds-btn { background:none; border:none; color:var(--text2); cursor:pointer; padding:4px 8px; border-radius:6px; font-size:1rem; }
.ds-btn:hover { background:rgba(255,255,255,0.08); color:var(--text); }
.ds-body { padding:14px; overflow-y:auto; max-height:440px; }
.ds-greeting { margin-bottom:12px; font-size:0.82rem; color:var(--text2); line-height:1.6; }
.ds-greeting ul { list-style:none; padding:0; margin-top:6px; }
.ds-greeting li { padding:3px 0; }
.ds-quick-buttons { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:14px; }
.ds-quick-btn { padding:8px 12px; border-radius:10px; border:1px solid rgba(255,255,255,0.08); background:rgba(74,108,247,0.08); color:var(--text); font-size:0.73rem; cursor:pointer; transition:all 0.2s; text-align:center; }
.ds-quick-btn:hover { background:rgba(74,108,247,0.2); border-color:rgba(74,108,247,0.3); transform:translateY(-1px); }
.ds-fallback { padding:12px; text-align:center; }
.ds-fallback .btn { width:100%; }
#ds-suggested-question { padding:10px; background:rgba(255,255,255,0.03); border-radius:8px; cursor:pointer; word-break:break-all; font-size:0.78rem; color:var(--text2); margin-top:8px; transition:all 0.2s; }
#ds-suggested-question:hover { background:rgba(124,92,252,0.1); color:var(--text); }

/* Badge glow for anomaly */
.badge-anomaly { display:inline-block; padding:3px 10px; border-radius:12px; font-size:0.75rem; font-weight:600; background:rgba(229,83,75,0.2); color:var(--red); }
.badge-normal { display:inline-block; padding:3px 10px; border-radius:12px; font-size:0.75rem; font-weight:600; background:rgba(38,166,65,0.15); color:var(--green); }
</style>
</head>
<body>

<!-- Header -->
<header>
  <h1>🎮 Steam <span>Game Analytics</span></h1>
  <nav>
    <button id="nav-overview" class="active" onclick="showOverview()">📊 游戏总览</button>
    <button id="nav-analyze" onclick="showAnalyze()">🔬 自由预测</button>
    <button id="nav-charts" onclick="showCharts()">📈 数据分析</button>
    <button id="nav-anomaly" onclick="showAnomalies()">⚠️ 异常分析</button>
  </nav>
</header>

<main id="app"><div class="loading">加载中...</div></main>

<!-- DeepSeek Widget -->
<div class="deepseek-widget">
  <button id="ds-toggle" class="ds-fab" onclick="toggleDeepSeek()" title="DeepSeek AI 助手">💬</button>
  <div id="ds-panel" class="ds-panel" style="display:none;">
    <div class="ds-header">
      <span>🤖 DeepSeek AI 助手</span>
      <div><button onclick="toggleDeepSeek()" class="ds-btn">✕</button></div>
    </div>
    <div class="ds-body">
      <div class="ds-greeting">
        <p>你好！我是 DeepSeek AI，你可以问我：</p>
        <ul><li>📊 解释数据分析图表</li><li>🎮 分析游戏评分趋势</li><li>📈 理解模型预测原理</li></ul>
      </div>
      <div class="ds-quick-buttons">
        <button class="ds-quick-btn" onclick="openDeepSeek('解释Steam游戏数据分析中的关键发现')">📊 数据解读</button>
        <button class="ds-quick-btn" onclick="openDeepSeek('游戏评分预测模型是如何工作的？')">🤖 预测原理</button>
        <button class="ds-quick-btn" onclick="openDeepSeek('什么是好评率？Steam游戏评分体系是怎样的？')">📖 评分体系</button>
        <button class="ds-quick-btn" onclick="openDeepSeek('如何判断一个Steam游戏是否值得购买？')">🎯 购游建议</button>
      </div>
      <div id="ds-fallback" class="ds-fallback">
        <p style="color:var(--text2);margin-bottom:12px;font-size:0.82rem;">DeepSeek 网页版无法直接嵌入<br>请点击下方按钮在新标签页中打开</p>
        <button class="btn" onclick="window.open('https://chat.deepseek.com/','_blank')">🚀 打开 DeepSeek 网页版</button>
        <div style="margin-top:10px;font-size:0.73rem;color:var(--text2);">
          <p>💡 可复制下方问题快速提问：</p>
          <div id="ds-suggested-question" onclick="copyAndOpen(this)">分析Steam游戏数据的关键指标</div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// ================================================================
// State
// ================================================================
const API = '';
let currentView = 'overview';
let currentGameId = null;
let currentGameTitle = '';
let currentPage = 1;
let gameListParams = { page:1, per_page:20, sort:'score', order:'desc', search:'' };
let statsData = null;
let allCharts = {};

// ================================================================
// Utils
// ================================================================
async function fetchAPI(url, opts) {
  try { const resp = await fetch(url, opts); if (!resp.ok) throw new Error(`HTTP ${resp.status}`); return await resp.json(); }
  catch(e) { console.error('API error:', e); return null; }
}
function scoreClass(pct) { if (pct == null) return ''; if (pct >= 80) return 'positive'; if (pct >= 50) return 'mixed'; return 'negative'; }
function scoreLabel(pct) { if (pct == null) return '-'; if (pct >= 80) return '好评'; if (pct >= 50) return '中评'; return '差评'; }
function fmtNum(n) { if (n == null) return '-'; if (n >= 1e6) return (n/1e6).toFixed(1)+'M'; if (n >= 1e3) return (n/1e3).toFixed(1)+'K'; return ''+n; }
function fmtPrice(p) { if (p == null || p == 0) return 'Free'; return '$'+Number(p).toFixed(2); }
function escapeHTML(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }
function destroyCharts() { Object.values(allCharts).forEach(c => { try { c.destroy(); } catch(e) {} }); allCharts = {}; }

// ================================================================
// View: Overview
// ================================================================
async function showOverview() {
  currentView = 'overview'; setNav('nav-overview'); destroyCharts();
  const app = document.getElementById('app');
  if (!statsData) statsData = await fetchAPI(API+'/api/stats');
  let html = renderStatsCards(statsData);
  html += renderToolbar();
  html += '<div id="game-table-wrap"></div><div id="pagination-wrap" class="pagination"></div>';
  app.innerHTML = html;
  loadGameList();
  document.getElementById('search-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') { gameListParams.search = e.target.value; gameListParams.page = 1; loadGameList(); }
  });
}

function renderStatsCards(s) {
  if (!s) return '';
  return `<div class="stats-grid">
    <div class="stat-card"><div class="label">游戏总数</div><div class="value">${fmtNum(s.total_games)}</div><div class="sub">含 ${s.free_games} 款免费游戏</div></div>
    <div class="stat-card"><div class="label">平均评分</div><div class="value accent">${s.avg_score}%</div><div class="sub">好评${s.sentiment?.positive||0} / 中评${s.sentiment?.mixed||0} / 差评${s.sentiment?.negative||0}</div></div>
    <div class="stat-card"><div class="label">平均价格</div><div class="value">$${s.avg_price}</div><div class="sub">付费游戏 ${s.paid_games||0} 款</div></div>
    <div class="stat-card"><div class="label">支持中文</div><div class="value">${s.cn_support_pct}%</div><div class="sub">${s.cn_support||0} 款游戏</div></div>
    <div class="stat-card"><div class="label">含内购</div><div class="value">${s.iap_count||0}</div><div class="sub">${((s.iap_count||0)/s.total_games*100).toFixed(1)}% 的游戏有内购</div></div>
  </div>`;
}

function renderToolbar() {
  return `<div class="toolbar">
    <input type="text" id="search-input" placeholder="🔍 搜索游戏名称 / 开发商 / 发行商..." value="${escapeHTML(gameListParams.search)}">
    <select id="sort-select" onchange="gameListParams.sort=this.value;gameListParams.page=1;loadGameList()">
      <option value="score" ${gameListParams.sort=='score'?'selected':''}>按评分</option>
      <option value="price" ${gameListParams.sort=='price'?'selected':''}>按价格</option>
      <option value="year" ${gameListParams.sort=='year'?'selected':''}>按年份</option>
      <option value="title" ${gameListParams.sort=='title'?'selected':''}>按名称</option>
    </select>
    <select id="order-select" onchange="gameListParams.order=this.value;gameListParams.page=1;loadGameList()">
      <option value="desc">降序</option><option value="asc">升序</option>
    </select>
    <select id="feature-filter" onchange="gameListParams.feature=this.value;gameListParams.page=1;loadGameList()">
      <option value="">全部特征</option><option value="singleplayer">单人</option><option value="multiplayer">多人</option>
      <option value="achievements">成就</option><option value="controller">手柄</option><option value="chinese">中文</option>
    </select>
    <button class="btn" onclick="gameListParams.page=1;loadGameList()">搜索</button>
  </div>`;
}

async function loadGameList() {
  const wrap = document.getElementById('game-table-wrap');
  const pag = document.getElementById('pagination-wrap');
  if (!wrap) return;
  const si = document.getElementById('search-input'); if (si) gameListParams.search = si.value;
  const sf = document.getElementById('feature-filter'); if (sf) gameListParams.feature = sf.value;
  const qs = new URLSearchParams(gameListParams);
  const data = await fetchAPI(API+'/api/games?'+qs.toString());
  if (!data) { wrap.innerHTML = '<div class="error">加载失败</div>'; return; }
  let html = '<div class="table-wrap"><table><thead><tr>';
  const headers = [['Title','标题'],['RecentReviewPct','评分'],['OriginalPrice','价格'],['Developer','开发商'],['ReleaseYear','年份'],['NumTags','标签数'],['NumLanguages','语言'],['SupportsChinese','中文']];
  for (const [key,label] of headers) {
    html += `<th onclick="gameListParams.sort='${key}';gameListParams.order=gameListParams.sort==='${key}'&&gameListParams.order==='asc'?'desc':'asc';gameListParams.page=1;loadGameList()">${label} ${gameListParams.sort==='${key}'?(gameListParams.order==='asc'?'▲':'▼'):''}</th>`;
  }
  html += '</tr></thead><tbody>';
  for (const g of data.games) {
    const sc = scoreClass(g.RecentReviewPct);
    html += `<tr onclick="showGameDetail(${g.id})">
      <td class="title" title="${escapeHTML(g.Title)}">${escapeHTML(g.Title)}</td>
      <td><span class="score-badge ${sc}">${g.RecentReviewPct!=null?g.RecentReviewPct+'%':'-'} ${scoreLabel(g.RecentReviewPct)}</span></td>
      <td>${fmtPrice(g.OriginalPrice)} ${g.IsOnSale?`<span style="color:var(--green);font-size:0.78rem">-${Math.round(g.DiscountRate)}%</span>`:''}</td>
      <td>${escapeHTML(g.Developer||'-')}</td><td>${g.ReleaseYear||'-'}</td><td>${g.NumTags||0}</td><td>${g.NumLanguages||0}</td><td>${g.SupportsChinese?'✅':'❌'}</td>
    </tr>`;
  }
  html += '</tbody></table></div>'; wrap.innerHTML = html;
  let pagHtml = `<button ${data.page<=1?'disabled':''} onclick="gameListParams.page=${data.page-1};loadGameList()">← 上一页</button>`;
  pagHtml += `<span>第 ${data.page}/${data.total_pages} 页 (共 ${data.total} 条)</span>`;
  pagHtml += `<button ${data.page>=data.total_pages?'disabled':''} onclick="gameListParams.page=${data.page+1};loadGameList()">下一页 →</button>`;
  pag.innerHTML = pagHtml;
}

async function showGameDetail(id) {
  currentView = 'detail'; currentGameId = id; destroyCharts();
  const app = document.getElementById('app');
  app.innerHTML = '<div class="loading">加载游戏详情...</div>';

  const data = await fetchAPI(API+'/api/games/'+id);
  if (!data) { app.innerHTML = '<div class="error">加载失败</div>'; return; }

  const g = data.game; currentGameTitle = g.Title;
  const sc = scoreClass(g.RecentReviewPct);
  let html = `<div class="detail-header"><button class="back-btn" onclick="showOverview()">← 返回列表</button><h2>${escapeHTML(g.Title)}</h2></div>`;

  // Detail grid
  html += `<div class="detail-grid">`;
  // Basic info
  html += `<div class="card"><h3>📋 基本信息</h3><table style="border:none"><tbody>
    <tr><td style="color:var(--text2);border:none;padding:4px 8px">开发商</td><td style="border:none;padding:4px 8px">${escapeHTML(g.Developer||'Unknown')}</td></tr>
    <tr><td style="color:var(--text2);border:none;padding:4px 8px">发行商</td><td style="border:none;padding:4px 8px">${escapeHTML(g.Publisher||'Unknown')}</td></tr>
    <tr><td style="color:var(--text2);border:none;padding:4px 8px">发行日期</td><td style="border:none;padding:4px 8px">${g.ReleaseYear||'?'}-${String(g.ReleaseMonth||1).padStart(2,'0')}</td></tr>
    <tr><td style="color:var(--text2);border:none;padding:4px 8px">原价</td><td style="border:none;padding:4px 8px">${fmtPrice(g.OriginalPrice)} ${g.IsOnSale?`<span style="color:var(--green)">折后 ${fmtPrice(g.DiscountedPrice)}</span>`:''}</td></tr>
    <tr><td style="color:var(--text2);border:none;padding:4px 8px">语言数</td><td style="border:none;padding:4px 8px">${g.NumLanguages||0} ${g.SupportsChinese?'(含中文)':'(无中文)'}</td></tr>
  </tbody></table></div>`;

  // Score
  html += `<div class="card score-meter"><h3>${g.RecentReviewPct?'近期评分':'评分'}</h3>
    <div class="big-score" style="color:${sc==='positive'?'var(--green)':sc==='mixed'?'var(--yellow)':'var(--red)'}">${g.RecentReviewPct||g.AllReviewPct||'-'}%</div>
    <div class="label">${g.RecentReviewCount?fmtNum(g.RecentReviewCount)+' 条评价':''}</div></div>`;

  // Features
  html += `<div class="card"><h3>⚙️ 游戏特征</h3><div class="feature-chips">`;
  ['HasSinglePlayer','HasMultiplayer','HasAchievements','HasControllerSupport','HasTradingCards','HasWorkshop','HasInAppPurchases'].forEach(k => {
    html += `<span class="chip ${g[k]?'on':''}">${g[k]?'✓':'✗'} ${k.replace('Has','')}</span>`;
  });
  html += `<span class="chip ${g.SupportsChinese?'on':''}">${g.SupportsChinese?'✓':'✗'} 中文</span></div></div>`;

  // Prediction
  const gap = data.prediction!=null&&g.RecentReviewPct!=null ? Math.abs(data.prediction-g.RecentReviewPct) : 0;
  html += `<div class="card prediction-box"><h3>🤖 AI 预测评分</h3>
    <div class="pred-score">${data.prediction!=null?data.prediction+'%':'--'}</div>
    <div style="color:var(--text2);margin-top:4px;font-size:0.85rem;">基于 ${g.NumFeatures||0} 特征 + ${g.NumTags||0} 标签的模型预测</div>
    ${data.prediction!=null&&g.RecentReviewPct!=null?`<div style="margin-top:8px;font-size:0.85rem;">真实 ${g.RecentReviewPct}% → 误差 ${gap.toFixed(1)} 个百分点</div>`:''}
  </div>`;
  html += `</div>`; // end detail-grid

  // Tags
  const tagsArr = Array.isArray(g.PopularTags) ? g.PopularTags : [];
  html += `<div class="card" style="margin-bottom:18px;"><h3>🏷️ 标签</h3><div class="tag-cloud">${tagsArr.map(t=>`<span class="tag" title="${escapeHTML(t)}">${escapeHTML(translateTag(t))}</span>`).join('')}</div></div>`;

  // Time-Series Charts (NEW - Requirement 1)
  html += `<div class="card" style="margin-bottom:18px;" id="review-history-card">
    <h3>📈 评论趋势分析 <span id="ts-loading" style="font-size:0.8rem;color:var(--text2);">加载中...</span></h3>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:18px;" id="ts-charts-container">
      <div class="chart-box" style="border:none;padding:0;"><canvas id="chart-ts-bar"></canvas></div>
      <div class="chart-box" style="border:none;padding:0;"><canvas id="chart-ts-line"></canvas></div>
    </div>
    <div id="ts-note" style="font-size:0.7rem;color:var(--text2);margin-top:8px;text-align:right;"></div>
  </div>`;

  // Gap Analysis (NEW - Requirement 3)
  if (data.gap_analysis && data.gap_analysis.has_gap) {
    html += renderGapAnalysis(data.gap_analysis);
  }

  // Similar games
  if (data.similar && data.similar.length) {
    html += `<div class="card" style="margin-bottom:18px;"><h3>🔗 同类游戏推荐</h3><div class="table-wrap"><table><thead><tr><th>游戏</th><th>评分</th><th>价格</th><th>开发商</th></tr></thead><tbody>`;
    for (const s of data.similar) {
      html += `<tr onclick="showGameDetail(${s.id})"><td class="title">${escapeHTML(s.Title)}</td><td><span class="score-badge ${scoreClass(s.RecentReviewPct)}">${s.RecentReviewPct||'-'}%</span></td><td>${fmtPrice(s.OriginalPrice)}</td><td>${escapeHTML(s.Developer||'')}</td></tr>`;
    }
    html += '</tbody></table></div></div>';
  }

  app.innerHTML = html;

  // Load review history chart after render
  loadReviewHistoryCharts(id);
}

function renderGapAnalysis(ga) {
  const isPositive = ga.direction === '模型低估';
  return `<div class="gap-alert ${isPositive?'positive':''}">
    <h3 style="color:${isPositive?'var(--green)':'var(--red)'};margin-bottom:8px;">🔍 预测差异分析 (差距 ${ga.gap_size}%)</h3>
    <p style="color:var(--text2);margin-bottom:12px;font-size:0.85rem;">
      模型预测 ${ga.predicted}%，游戏实际 ${ga.actual}%。${ga.direction === '模型低估' ? '模型低估了该游戏评分。' : '模型高估了该游戏评分。'}
    </p>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
      ${ga.reasons.map(r => `
        <div class="gap-reason ${r.direction==='positive'?'positive':''}">
          <div style="display:flex;justify-content:space-between;align-items:center;">
            <strong style="font-size:0.83rem;">${r.type==='经典老游戏效应'?'🏛️':r.type==='近期质量下滑'?'📉':r.type==='开发商持续改进'?'📈':r.type==='内购引发差评'?'💸':r.type==='本地化不足'?'🌐':r.type==='抢先体验阶段'?'🔧':r.type==='定价过高'?'💲':r.type==='社区氛围问题'?'👥':r.type==='大众市场突破'?'🌟':'📊'} ${r.type}</strong>
            <span class="score-badge ${r.direction==='positive'?'positive':'negative'}" style="font-size:0.68rem;">
              ${r.direction==='positive'?'↑ 拉高评分':'↓ 拉低评分'}
            </span>
          </div>
          <p style="font-size:0.78rem;color:var(--text2);margin:6px 0;">${r.text}</p>
          <div class="confidence-bar"><div class="confidence-fill" style="width:${r.confidence*100}%;background:${isPositive?'var(--green)':'var(--red)'};"></div></div>
          <div style="font-size:0.68rem;color:var(--text2);margin-top:2px;">置信度: ${(r.confidence*100).toFixed(0)}%</div>
        </div>
      `).join('')}
    </div>
    ${ga.feature_analysis ? `
    <div style="margin-top:12px;font-size:0.78rem;color:var(--text2);">
      <b>特征贡献:</b>
      ${ga.feature_analysis.negative_factors?.length ? ' 负向: '+ga.feature_analysis.negative_factors.map(f=>`${f.feature}(${f.impact})`).join(', ') : ''}
      ${ga.feature_analysis.positive_factors?.length ? ' 正向: '+ga.feature_analysis.positive_factors.map(f=>`${f.feature}(${f.impact})`).join(', ') : ''}
    </div>`:''}
  </div>`;
}

async function loadReviewHistoryCharts(id) {
  const data = await fetchAPI(API+'/api/games/'+id+'/review-history?months=60');
  const loadingEl = document.getElementById('ts-loading');
  if (!data || !data.months || !data.months.length) {
    if (loadingEl) loadingEl.textContent = '暂无足够数据';
    return;
  }
  if (loadingEl) loadingEl.style.display = 'none';
  document.getElementById('ts-note').textContent = data.generation_info?.method === 'synthetic_s_curve' ? '※ 基于S曲线模型的模拟趋势数据' : '';

  const labels = data.months.map(m => m.date);
  const posData = data.months.map(m => m.positive);
  const negData = data.months.map(m => m.negative);
  const ratingData = data.months.map(m => m.rating);

  // Prepare prediction extension
  let allLabels = [...labels];
  let allRatings = [...ratingData];
  let predRatings = new Array(ratingData.length).fill(null);
  let predUpper = new Array(ratingData.length).fill(null);
  let predLower = new Array(ratingData.length).fill(null);

  if (data.prediction_endpoint) {
    const ep = data.prediction_endpoint;
    allLabels = [...labels, ...ep.dates];
    allRatings = [...ratingData, ...new Array(ep.dates.length).fill(null)];
    predRatings = [...new Array(ratingData.length).fill(null), ...new Array(ep.dates.length).fill(null)];
    const lastActual = ratingData[ratingData.length-1];
    for (let i = 0; i < ep.dates.length; i++) {
      const t = (i+1) / ep.dates.length;
      predRatings[ratingData.length + i] = lastActual + (ep.predicted_pct - lastActual) * t;
    }
    predUpper = [...new Array(ratingData.length).fill(null), ...ep.confidence_interval.map(() => ep.confidence_interval[1])];
    predLower = [...new Array(ratingData.length).fill(null), ...ep.confidence_interval.map(() => ep.confidence_interval[0])];
  }

  // Chart 1: Stacked bar
  const ctx1 = document.getElementById('chart-ts-bar')?.getContext('2d');
  if (ctx1) {
    allCharts.tsBar = new Chart(ctx1, {
      type: 'bar',
      data: {
        labels,
        datasets: [
          { label: '好评', data: posData, backgroundColor: 'rgba(38,166,65,0.65)', borderRadius: 2 },
          { label: '差评', data: negData, backgroundColor: 'rgba(229,83,75,0.55)', borderRadius: 2 },
        ]
      },
      options: {
        responsive: true,
        scales: {
          x: { stacked: true, ticks: { color: '#7c8099', maxTicksLimit: 12, font: { size: 10 } }, grid: { display: false } },
          y: { stacked: true, ticks: { color: '#7c8099' }, grid: { color: 'rgba(255,255,255,0.05)' } }
        },
        plugins: { legend: { labels: { color: '#e8eaf0', font: { size: 11 } } } }
      }
    });
  }

  // Chart 2: Rating line with prediction
  const ctx2 = document.getElementById('chart-ts-line')?.getContext('2d');
  if (ctx2) {
    allCharts.tsLine = new Chart(ctx2, {
      type: 'line',
      data: {
        labels: allLabels,
        datasets: [
          { label: '历史评分', data: allRatings, borderColor: '#58a6ff', backgroundColor: 'rgba(88,166,255,0.06)', fill: true, tension: 0.3, pointRadius: 1, spanGaps: false },
          { label: '模型预测', data: predRatings, borderColor: '#7c5cfc', borderDash: [6,3], tension: 0.3, pointRadius: data.prediction_endpoint ? [...new Array(ratingData.length).fill(0), 6] : 0, pointBackgroundColor: '#7c5cfc', pointBorderColor: '#fff', pointBorderWidth: 2 },
          { label: '置信区间', data: predUpper, borderColor: 'rgba(124,92,252,0.2)', backgroundColor: 'rgba(124,92,252,0.06)', fill: false, pointRadius: 0, borderDash: [2,2] },
        ]
      },
      options: {
        responsive: true,
        scales: {
          x: { ticks: { color: '#7c8099', maxTicksLimit: 12, font: { size: 10 } }, grid: { display: false } },
          y: { min: 0, max: 100, ticks: { color: '#7c8099' }, grid: { color: 'rgba(255,255,255,0.05)' } }
        },
        plugins: { legend: { labels: { color: '#e8eaf0', font: { size: 11 } } } }
      }
    });
  }
}

const tagMap = { '独立游戏':'Indie','动作':'Action','冒险':'Adventure','休闲':'Casual','单人':'Singleplayer','模拟':'Simulation','角色扮演':'RPG','策略':'Strategy','2D':'2D','3D':'3D','多人':'Multiplayer','解谜':'Puzzle','恐怖':'Horror','第一人称射击':'FPS','开放世界':'Open World','奇幻':'Fantasy','科幻':'Sci-fi','生存':'Survival','射击':'Shooter','竞速':'Racing' };
const topTags = Object.keys(tagMap);

async function showAnalyze() {
  currentView = 'analyze'; setNav('nav-analyze'); destroyCharts();
  const app = document.getElementById('app');
  let html = `<h2 style="margin-bottom:16px;">🔬 自由预测工具</h2><p style="color:var(--text2);margin-bottom:20px;">调整以下参数，AI将实时预测该配置下游戏的预期好评率。</p>`;
  html += `<div class="detail-grid">
    <div class="card"><h3>游戏参数设定</h3><div class="predict-form">
      <div class="form-group"><label>价格 (USD)</label><input type="number" id="p-price" value="9.99" step="1" min="0"></div>
      <div class="form-group"><label>语言数</label><input type="number" id="p-lang" value="5" min="1" max="30"></div>
      <div class="form-group"><label>发行年份</label><input type="number" id="p-year" value="2024" min="2000" max="2026"></div>
      <div class="form-group"><label>发行月份</label><select id="p-month">${Array.from({length:12},(_,i)=>`<option value="${i+1}" ${i==5?'selected':''}>${i+1}月</option>`).join('')}</select></div>
      <div class="form-group"><label>特征数</label><input type="range" id="p-feats" min="0" max="10" value="3" oninput="document.getElementById('p-feats-v').textContent=this.value"><span id="p-feats-v" style="color:var(--text2)">3</span></div>
      <div class="form-group"><label>标签数</label><input type="range" id="p-tags-n" min="1" max="20" value="10" oninput="document.getElementById('p-tags-v').textContent=this.value"><span id="p-tags-v" style="color:var(--text2)">10</span></div>
    </div>
    <h4 style="margin:14px 0 8px;">游戏特征</h4>
    <div class="toggle-row" id="toggle-features">
      ${['单人游戏','多人游戏','手柄支持','Steam成就','交易卡','内购','创意工坊','支持中文'].map((l,i) => {
        const keys = ['HasSinglePlayer','HasMultiplayer','HasControllerSupport','HasAchievements','HasTradingCards','HasInAppPurchases','HasWorkshop','SupportsChinese'];
        return `<span class="toggle ${(i===0||i===3)?'active':''}" data-key="${keys[i]}" onclick="this.classList.toggle('active')">${l}</span>`;
      }).join('')}
    </div>
    <h4 style="margin:14px 0 8px;">标签选择 <span style="font-size:0.75rem;color:var(--text2)">(点击选中，最多10个)</span></h4>
    <div class="tag-cloud" id="tag-selector">${topTags.map(t=>`<span class="tag" style="cursor:pointer" onclick="this.classList.toggle('active');this.style.background=this.classList.contains('active')?'var(--accent)':'';this.style.color=this.classList.contains('active')?'#fff':''">${t}</span>`).join('')}</div>
    <button class="btn" style="margin-top:16px;width:100%;padding:14px;font-size:1rem;" onclick="runPrediction()">🤖 开始预测</button></div>
    <div>
      <div class="card prediction-box" id="predict-result-box"><h3>预测结果</h3><div style="font-size:3rem;font-weight:800;color:var(--accent);" id="predict-score">--%</div><div id="predict-label" style="margin-top:6px;"></div><div id="predict-factors" style="margin-top:12px;font-size:0.85rem;"></div></div>
      <div class="card" style="margin-top:16px;"><h3>模型特征重要性</h3><div id="feature-imp-list" style="font-size:0.85rem;">加载中...</div></div>
    </div>
  </div>`;
  app.innerHTML = html;
  const imp = await fetchAPI(API+'/api/feature-importance');
  if (imp) { document.getElementById('feature-imp-list').innerHTML = imp.slice(0,12).map(f=>`<div style="display:flex;align-items:center;gap:8px;margin:6px 0;"><span style="min-width:140px;font-size:0.78rem;">${f.feature_cn||f.feature}</span><div style="flex:1;height:6px;background:rgba(255,255,255,0.05);border-radius:3px;"><div style="width:${Math.round(f.importance*1000)}%;height:100%;background:var(--accent-gradient);border-radius:3px;"></div></div><span style="font-size:0.73rem;color:var(--text2);min-width:46px;">${(f.importance*100).toFixed(1)}%</span></div>`).join(''); }
}

async function runPrediction() {
  const box = document.getElementById('predict-score'); const label = document.getElementById('predict-label'); const factors = document.getElementById('predict-factors');
  box.textContent = '...'; label.innerHTML = ''; factors.innerHTML = '';
  const features = {};
  document.querySelectorAll('#toggle-features .toggle').forEach(el => { const k = el.dataset.key; if (k) features[k] = el.classList.contains('active') ? 1 : 0; });
  const selectedTags = []; document.querySelectorAll('#tag-selector .tag.active').forEach(el => { const cn = el.textContent.trim(); selectedTags.push(tagMap[cn] || cn); });
  const body = { OriginalPrice: parseFloat(document.getElementById('p-price').value)||0, ReleaseYear: parseInt(document.getElementById('p-year').value)||2024, ReleaseMonth: parseInt(document.getElementById('p-month').value)||6, NumLanguages: parseInt(document.getElementById('p-lang').value)||5, NumFeatures: parseInt(document.getElementById('p-feats').value)||3, NumTags: parseInt(document.getElementById('p-tags-n').value)||10, IsFree: (parseFloat(document.getElementById('p-price').value)||0)===0?1:0, tags: selectedTags, ...features };
  const result = await fetchAPI(API+'/api/predict', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
  if (result) {
    box.textContent = result.predicted_score + '%';
    const cls = result.interpretation;
    label.innerHTML = cls==='Positive'?'<span class="score-badge positive">预测为好評</span>':cls==='Mixed'?'<span class="score-badge mixed">预测为中评</span>':'<span class="score-badge negative">预测为差评</span>';
    if (result.top_factors) { factors.innerHTML = '<div style="text-align:left;margin-top:8px;"><b>关键影响因素:</b><br>'+result.top_factors.map(f=>`<span style="color:${f.impact>0?'var(--green)':'var(--red)'}">${f.impact>0?'↑':'↓'} ${f.feature_cn||f.feature}</span>`).join(' &nbsp;|&nbsp; ')+'</div>'; }
  } else { box.textContent = '预测失败'; label.innerHTML = '<span style="color:var(--red);font-size:0.85rem;">请检查参数后重试</span>'; }
}

  const s = statsData;
  let html = `<h2 style="margin-bottom:16px;">📈 数据分析看板</h2>` + renderStatsCards(s);
  html += `<div class="charts-grid">
    <div class="chart-box"><h3>评分分布</h3><canvas id="chart-sentiment"></canvas></div>
    <div class="chart-box"><h3>价格分布</h3><canvas id="chart-price"></canvas></div>
    <div class="chart-box"><h3>年度趋势</h3><canvas id="chart-year"></canvas></div>
    <div class="chart-box"><h3>热门标签 Top 15</h3><canvas id="chart-tags"></canvas></div>

  app.innerHTML = html;

  const ctx1 = document.getElementById('chart-sentiment')?.getContext('2d');
  if (ctx1) { allCharts.sentiment = new Chart(ctx1, { type:'doughnut', data:{ labels:['好评 (>=80%)','中评 (50-79%)','差评 (<50%)'], datasets:[{ data:[s.sentiment?.positive||0,s.sentiment?.mixed||0,s.sentiment?.negative||0], backgroundColor:['#26a641','#d29922','#e5534b'], borderColor:'rgba(22,24,35,0.8)', borderWidth:3 }] }, options:{ responsive:true, plugins:{ legend:{ labels:{ color:'#e8eaf0' } } } } }); }

  const ctx2 = document.getElementById('chart-price')?.getContext('2d');
  if (ctx2 && s.price_distribution) { allCharts.price = new Chart(ctx2, { type:'bar', data:{ labels:s.price_distribution.map(d=>d.label), datasets:[{ label:'游戏数量', data:s.price_distribution.map(d=>d.count), backgroundColor:'#7c5cfc', borderRadius:6 }] }, options:{ responsive:true, scales:{ x:{ ticks:{ color:'#7c8099' } }, y:{ ticks:{ color:'#7c8099' }, grid:{ color:'rgba(255,255,255,0.05)' } } }, plugins:{ legend:{ labels:{ color:'#e8eaf0' } } } } }); }

  const ctx3 = document.getElementById('chart-year')?.getContext('2d');
  if (ctx3 && s.year_trend) { allCharts.year = new Chart(ctx3, { type:'line', data:{ labels:s.year_trend.map(d=>d.year), datasets:[ { label:'游戏数量', data:s.year_trend.map(d=>d.count), borderColor:'#7c5cfc', backgroundColor:'rgba(124,92,252,0.06)', yAxisID:'y', fill:true, tension:0.3 }, { label:'平均评分(%)', data:s.year_trend.map(d=>d.avg_score), borderColor:'#26a641', yAxisID:'y1', tension:0.3, borderWidth:2 } ] }, options:{ responsive:true, scales:{ x:{ ticks:{ color:'#7c8099', maxTicksLimit:10 } }, y:{ position:'left', ticks:{ color:'#7c8099' }, grid:{ color:'rgba(255,255,255,0.05)' }, title:{ display:true, text:'游戏数量', color:'#7c8099' } }, y1:{ position:'right', min:60, max:90, ticks:{ color:'#26a641' }, grid:{ display:false }, title:{ display:true, text:'平均评分', color:'#26a641' } } }, plugins:{ legend:{ labels:{ color:'#e8eaf0' } } } } }); }

  const ctx4 = document.getElementById('chart-tags')?.getContext('2d');
  if (ctx4 && s.top_tags) { const top15 = s.top_tags.slice(0,15); allCharts.tags = new Chart(ctx4, { type:'bar', data:{ labels:top15.map(t=>t.name_cn||t.name), datasets:[{ label:'出现次数', data:top15.map(t=>t.count), backgroundColor:top15.map((_,i)=>`hsl(${260+i*10},60%,55%)`), borderRadius:6 }] }, options:{ indexAxis:'y', responsive:true, scales:{ x:{ ticks:{ color:'#7c8099' }, grid:{ color:'rgba(255,255,255,0.05)' } }, y:{ ticks:{ color:'#7c8099', font:{ size:11 } } } }, plugins:{ legend:{ labels:{ color:'#e8eaf0' } } } } }); }
}

async function showAnomalies() {
  currentView = 'anomaly'; setNav('nav-anomaly'); destroyCharts();
  const app = document.getElementById('app');
  app.innerHTML = '<div class="loading">加载异常数据分析...</div>';

  const data = await fetchAPI(API+'/api/anomalies?per_page=20');
  if (!data) { app.innerHTML = '<div class="error">加载失败</div>'; return; }

  let html = `<h2 style="margin-bottom:16px;">⚠️ 异常数据深度分析</h2>
  <div style="padding:12px 18px;border-radius:10px;background:rgba(210,153,34,0.1);border:1px solid rgba(210,153,34,0.2);margin-bottom:18px;font-size:0.82rem;color:var(--text2);">
    ⚡ 以下分析基于 <b>IsolationForest</b> 无监督异常检测算法 (contamination=0.05)。<b>原始清洗逻辑未做任何修改</b>——这些异常数据是额外分析维度，不会影响模型训练和主流程。
  </div>`;

  // Stats
  html += `<div class="stats-grid">
    <div class="stat-card" style="border-color:rgba(229,83,75,0.3);"><div class="label">检测异常游戏</div><div class="value" style="color:var(--red);">${data.total_anomalies}</div><div class="sub">占总游戏 ${data.anomaly_rate}%</div></div>
    <div class="stat-card"><div class="label">异常平均评分</div><div class="value" style="color:var(--yellow);">${data.anomaly_stats.avg_score_anomaly}%</div><div class="sub">正常平均: ${data.anomaly_stats.avg_score_normal}%</div></div>
    <div class="stat-card"><div class="label">异常平均价格</div><div class="value" style="color:var(--yellow);">$${data.anomaly_stats.avg_price_anomaly}</div><div class="sub">正常平均: $${data.anomaly_stats.avg_price_normal}</div></div>
    <div class="stat-card"><div class="label">分析可信度</div><div class="value">高</div><div class="sub">IsolationForest + 多维度规则引擎</div></div>
  </div>`;

  // Charts
  html += `<div class="charts-grid">
    <div class="chart-box"><h3>评分 vs 价格 (异常高亮) <span style="font-size:0.7rem;color:var(--text2);">红色=异常</span></h3><canvas id="chart-anom-scatter"></canvas></div>
    <div class="chart-box"><h3>异常原因分布</h3><canvas id="chart-anom-reasons"></canvas></div>
  </div>`;

  // Box plot section
  html += `<div class="card" style="margin-bottom:18px;"><h3>📦 评分分布对比 (箱线图)</h3>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
      <div><h4 style="font-size:0.8rem;color:var(--text2);margin-bottom:8px;">正常 vs 异常 — 价格分布</h4>
        <div style="display:flex;gap:20px;">
          <div style="flex:1;text-align:center;"><div style="font-size:1.2rem;font-weight:700;color:var(--green);">$${data.boxplot_data.price_normal[2]}</div><div style="font-size:0.7rem;color:var(--text2);">正常中位数</div></div>
          <div style="flex:1;text-align:center;"><div style="font-size:1.2rem;font-weight:700;color:var(--red);">$${data.boxplot_data.price_anomaly[2]}</div><div style="font-size:0.7rem;color:var(--text2);">异常中位数</div></div>
        </div>
      </div>
      <div><h4 style="font-size:0.8rem;color:var(--text2);margin-bottom:8px;">正常 vs 异常 — 评分分布</h4>
        <div style="display:flex;gap:20px;">
          <div style="flex:1;text-align:center;"><div style="font-size:1.2rem;font-weight:700;color:var(--green);">${data.boxplot_data.score_normal[2]}%</div><div style="font-size:0.7rem;color:var(--text2);">正常中位数</div></div>
          <div style="flex:1;text-align:center;"><div style="font-size:1.2rem;font-weight:700;color:var(--red);">${data.boxplot_data.score_anomaly[2]}%</div><div style="font-size:0.7rem;color:var(--text2);">异常中位数</div></div>
        </div>
      </div>
    </div>
  </div>`;

  // Anomaly game list
  html += `<div class="card" style="margin-bottom:18px;"><h3>📋 异常游戏列表 (${data.total_anomalies} 款)</h3>
    <div class="table-wrap"><table><thead><tr>
      <th>ID</th><th>游戏名称</th><th>评分</th><th>价格</th><th>评论数</th><th>年份</th><th>异常分数</th><th>异常原因</th>
    </tr></thead><tbody>`;
  for (const a of data.anomaly_games) {
    html += `<tr onclick="showGameDetail(${a.id})" style="cursor:pointer;">

  app.innerHTML = html;

  // Render anomaly charts
  renderAnomalyCharts(data);

function renderAnomalyCharts(data) {
  // Scatter: price vs score
  const ctx1 = document.getElementById('chart-anom-scatter')?.getContext('2d');
  if (ctx1 && data.scatter_data) {
    const normal = data.scatter_data.filter(d => !d.is_anomaly);
    const anomaly = data.scatter_data.filter(d => d.is_anomaly);
    allCharts.anomScatter = new Chart(ctx1, {
      type: 'scatter',
      data: {
        datasets: [
          { label: '正常', data: normal.map(d => ({x:Math.min(d.x,200), y:d.y})), backgroundColor:'rgba(88,166,255,0.2)', pointRadius:3 },
          { label: '异常', data: anomaly.map(d => ({x:Math.min(d.x,200), y:d.y})), backgroundColor:'rgba(229,83,75,0.5)', pointRadius:5, pointBorderColor:'#e5534b' },
        ]
      },
      options: {
        responsive: true,
        scales: {
          x: { title:{display:true,text:'价格 (USD)',color:'#7c8099'}, ticks:{color:'#7c8099'}, grid:{color:'rgba(255,255,255,0.05)'}, type:'logarithmic' },
          y: { title:{display:true,text:'评分 (%)',color:'#7c8099'}, ticks:{color:'#7c8099'}, grid:{color:'rgba(255,255,255,0.05)'} }
        },
        plugins: { legend:{labels:{color:'#e8eaf0'}} }
      }
    });
  }

  // Reason distribution (doughnut)
  const ctx2 = document.getElementById('chart-anom-reasons')?.getContext('2d');
  if (ctx2 && data.reason_distribution) {
    const colors = ['#e5534b','#f0c060','#58a6ff','#7c5cfc','#26a641','#d29922','#e89040','#3dd68c'];
    allCharts.anomReasons = new Chart(ctx2, {
      type: 'doughnut',
      data: {
        labels: data.reason_distribution.map(r => r.reason),
        datasets: [{ data: data.reason_distribution.map(r => r.count), backgroundColor: colors.slice(0, data.reason_distribution.length), borderColor:'rgba(22,24,35,0.8)', borderWidth:2 }]
      },
      options: {
        responsive: true,
        plugins: { legend:{position:'bottom',labels:{color:'#e8eaf0',font:{size:10}}}} }
    });
  }
}

function setNav(id) {
  document.querySelectorAll('header nav button').forEach(b => b.classList.remove('active'));
  document.getElementById(id)?.classList.add('active');
}

// ================================================================
// DeepSeek Widget
// ================================================================
let dsOpen = false;

function toggleDeepSeek() {
  dsOpen = !dsOpen;
  document.getElementById('ds-panel').style.display = dsOpen ? 'block' : 'none';
  if (dsOpen) updateSuggestedQuestion();
}

function openDeepSeek(hint) {
  window.open('https://chat.deepseek.com/', '_blank');
  if (hint) { try { navigator.clipboard.writeText(hint); } catch(e) {} }
}

function copyAndOpen(el) {
  const text = el.textContent.trim();
  try { navigator.clipboard.writeText(text); } catch(e) {}
  window.open('https://chat.deepseek.com/', '_blank');
}

function updateSuggestedQuestion() {
  const el = document.getElementById('ds-suggested-question');
  if (!el) return;
  if (currentView === 'detail' && currentGameTitle) {
    el.textContent = `分析游戏"${currentGameTitle}"的数据特征和评分预测结果`;
  } else if (currentView === 'anomaly') {
    el.textContent = '解释异常数据检测的原理和当前发现的异常模式';
  } else if (currentView === 'charts') {
    el.textContent = '解释当前Steam游戏数据分析图表中的关键趋势';
  } else {
    el.textContent = '分析Steam游戏数据的关键指标和评分预测模型';
  }
}

// Close widget when clicking outside
document.addEventListener('click', function(e) {
  const widget = document.querySelector('.deepseek-widget');
  if (dsOpen && widget && !widget.contains(e.target)) {
    toggleDeepSeek();
  }
});

// ================================================================
// Init
// ================================================================
showOverview();
</script>
